version: "3.9"

services:
  # ── PostgreSQL ─────────────────────────────────────────────────────────────
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER:     postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB:       chatbot
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── Streamlit app ──────────────────────────────────────────────────────────
  app:
    build: .
    restart: unless-stopped
    ports:
      - "8501:8501"
    env_file:
      - .env
    environment:
      # Override DATABASE_URL to reach the postgres container by service name
      DATABASE_URL: postgresql://postgres:postgres@postgres:5432/chatbot?sslmode=disable
    depends_on:
      postgres:
        condition: service_healthy
    volumes:
      # Mount source so code changes reflect without a rebuild (dev mode)
      - .:/app

volumes:
  postgres_data:
